<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="stylesheet" href="news.css">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png">
  
  <title>Frontend Mentor | Newsletter sign-up form with success message</title>

  <!-- Feel free to remove these styles or customise in your own stylesheet 👍 -->
  <style>
    .attribution { font-size: 11px; text-align: center; }
    .attribution a { color: hsl(228, 45%, 44%); }
  </style>
</head>
<body>

  <!-- Sign-up form start -->
<div class="card">
  <div class="card-left">
  <h1><b>Stay updated!</b></h1>

  <p>Join 60,000+ product managers receiving monthly <br> updates on:</p>
<li>
  <ul>
    <img src="assets/images/icon-list.svg" alt="" class="img1">
  Product discovery and building what matters</ul>
  <ul>
     <img src="assets/images/icon-list.svg" alt="" class="img1">
  Measuring to ensure updates are a success</ul>
  <ul>
     <img src="assets/images/icon-list.svg" alt="" class="img1">And much more!</ul>
</li>
<form action="">
  <label for="email"> Email address</label><br>
  <input type="email" class="email" id="email@company.com"  placeholder="email@company.com" required>
  <button class="button" id="openpopup">Subscribe to monthly newsletter</button>
</form>   
  
</div>
<img src="assets/images/illustration-sign-up-desktop.svg" alt="">







 
</body>
</html>
